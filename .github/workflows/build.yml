name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # v3 se v4 kiya

      - name: Set up Node.js
        uses: actions/setup-node@v4  # v3 se v4 kiya
        with:
          node-version: '22'  # quotes add kiye

      - name: Install Dependencies
        run: npm install

      - name: Build Web Code
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4  # v3 se v4 kiya
        with:
          distribution: 'temurin'  # zulu se temurin kiya (better support)
          java-version: '17'  # 21 se 17 kiya (Capacitor ke liye best)

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Attendify-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk