name: Build, Release & Update Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: npm run build --if-present

      - name: Add and Sync Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 👇 YEH NAYA STEP HAI: Android SDK Install karega
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 👇 YEH NAYA STEP HAI: Licenses Accept karega (Error fix)
      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Fetch Current Version from Supabase
        id: get_version
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          URL="${SUPABASE_URL%/}"
          RESPONSE=$(curl -s -X GET "$URL/rest/v1/app_version?id=eq.1&select=version_code" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          CURRENT_CODE=$(echo "$RESPONSE" | jq '.[0].version_code')
          if [ "$CURRENT_CODE" == "null" ] || [ -z "$CURRENT_CODE" ]; then 
            CURRENT_CODE=0
          fi
          NEW_CODE=$((CURRENT_CODE + 1))
          NEW_NAME="1.0.$NEW_CODE" 
          echo "new_code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "new_name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release & Upload APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: "android/app/build/outputs/apk/debug/app-debug.apk"
          tag: "v${{ steps.get_version.outputs.new_name }}"
          name: "Attendify Release ${{ steps.get_version.outputs.new_name }}"
          body: "Automated build from main branch. Force update enabled."
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Supabase App Version
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          URL="${SUPABASE_URL%/}"
          NEW_CODE="${{ steps.get_version.outputs.new_code }}"
          NEW_NAME="${{ steps.get_version.outputs.new_name }}"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/v${NEW_NAME}/app-debug.apk"
          curl -s -X PATCH "$URL/rest/v1/app_version?id=eq.1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"version_code\": $NEW_CODE,
              \"version_name\": \"$NEW_NAME\",
              \"apk_url\": \"$APK_URL\",
              \"force_update\": true
            }"
