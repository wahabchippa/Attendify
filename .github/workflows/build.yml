name: Build, Release & Update Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: npm run build --if-present

      - name: Add and Sync Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & Install SDK 34
        uses: android-actions/setup-android@v3
        
      - name: Install Specific SDK Packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses || true

      - name: Fix Gradle Memory & SDK Versions
        run: |
          cd android
          
          # 1. Purani file delete karein taake duplicate parameters ka crash na ho
          rm -f gradle.properties
          
          # 2. Bilkul nayi aur saaf file banayein
          echo "org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8" > gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 3. SDK 34 force karein (Without spaces issue)
          sed -i 's/compileSdkVersion.*/compileSdkVersion = 34/' variables.gradle
          sed -i 's/targetSdkVersion.*/targetSdkVersion = 34/' variables.gradle
          
          echo "✅ Gradle properties fixed!"

      # 👇 JADOOI STEP 1: Build run karein aur log ko file mein save karein
      - name: Build APK with Gradle (Capture Log)
        id: build_apk
        continue-on-error: true # Agar fail bhi ho tab bhi rukay ga nahi
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew --stop || true
          # Saara output (error + success) build.log file mein save hoga
          ./gradlew assembleDebug --stacktrace --no-daemon > build.log 2>&1

      # 👇 JADOOI STEP 2: Agar fail hua, toh asli error screen par print karein
      - name: 🚨 Print Exact Error (If Build Failed)
        if: steps.build_apk.outcome == 'failure'
        run: |
          echo "========================================="
          echo "❌ GRADLE BUILD FAILED! HERE IS THE EXACT ERROR:"
          echo "========================================="
          # Log file ki aakhri 100 lines print karein jahan asli error hota hai
          tail -n 100 android/build.log || true
          echo "========================================="
          # Ab workflow ko fail kar dein
          exit 1 

      # 👇 Yahan se neechay Supabase wala code hai (Sirf tab chalega jab build pass ho)
      - name: Fetch Current Version from Supabase
        if: steps.build_apk.outcome == 'success'
        id: get_version
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          URL="${SUPABASE_URL%/}"
          RESPONSE=$(curl -s -X GET "$URL/rest/v1/app_version?id=eq.1&select=version_code" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          CURRENT_CODE=$(echo "$RESPONSE" | jq '.[0].version_code')
          if [ "$CURRENT_CODE" == "null" ] || [ -z "$CURRENT_CODE" ]; then CURRENT_CODE=0; fi
          NEW_CODE=$((CURRENT_CODE + 1))
          NEW_NAME="1.0.$NEW_CODE" 
          echo "new_code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "new_name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release & Upload APK
        if: steps.build_apk.outcome == 'success'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "android/app/build/outputs/apk/debug/app-debug.apk"
          tag: "v${{ steps.get_version.outputs.new_name }}"
          name: "Attendify Release ${{ steps.get_version.outputs.new_name }}"
          body: "Automated build from main branch. Force update enabled."
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Supabase App Version
        if: steps.build_apk.outcome == 'success'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          URL="${SUPABASE_URL%/}"
          NEW_CODE="${{ steps.get_version.outputs.new_code }}"
          NEW_NAME="${{ steps.get_version.outputs.new_name }}"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/v${NEW_NAME}/app-debug.apk"
          curl -s -X PATCH "$URL/rest/v1/app_version?id=eq.1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"version_code\": $NEW_CODE, \"version_name\": \"$NEW_NAME\", \"apk_url\": \"$APK_URL\", \"force_update\": true}"
