name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install -g @capacitor/assets

      - name: Build Web Project
        run: npm run build --if-present

      - name: Add and Sync Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Create and Generate App Icon Automatically
        run: |
          mkdir -p assets
          # Yeh command khud hi ek default naya icon background mein create kar degi
          curl -s "https://dummyimage.com/512x512/0066cc/ffffff.png&text=Attendify" -o assets/icon-only.png
          cp assets/icon-only.png assets/icon.png
          cp assets/icon-only.png assets/splash.png
          cp assets/icon-only.png assets/splash-dark.png
          npx capacitor-assets generate --android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Attendify-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
