# File: .github/workflows/release.yml

name: Build and Release Android APK

on:
  # Yeh workflow tab chalega jab aap ek naya "release" create karenge GitHub par
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Aapka code download karega
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Java (JDK) set up karega jo Android build ke liye zaroori hai
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Node.js set up karega (npm install ke liye)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 4: Saare node packages install karega
      - name: Install Dependencies
        run: npm install

      # Step 5: Web assets build karega (Vite)
      - name: Build Web Assets
        run: npm run build

      # Step 6: Capacitor ko web assets se sync karega
      - name: Sync Capacitor
        run: npx cap sync android

      # Step 7: Gradle file mein version update karega
      - name: Update Version in Gradle
        run: |
          # Release tag se version name nikale ga (e.g., v1.0.3 -> 1.0.3)
          VERSION_NAME=${{ github.event.release.tag_name }}
          # Gradle file mein naya version name update karega
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          # Naya version code (number of commits) set karega
          VERSION_CODE=$(git rev-list --count HEAD)
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle
          echo "Updated to Version: $VERSION_NAME ($VERSION_CODE)"

      # Step 8: Keystore file ko secret se decode karke banayega
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/my-release-key.jks
          echo "Keystore file created."

      # Step 9: Android APK build karega
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          
      # Step 10: APK file ko sign karega
      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks android/my-release-key.jks --ks-key-alias ${{ secrets.KEY_ALIAS }} --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} android/app/build/outputs/apk/release/app-release-unsigned.apk
        
      # Step 11: Supabase CLI install karega aur APK upload karega
      - name: Upload to Supabase and Update DB
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }} # <-- Yeh secret add karna padega
          APK_PATH: android/app/build/outputs/apk/release/app-release-unsigned.apk # Signed APK yahi hota hai is process mein
          BUCKET_NAME: 'apk' # Aapke bucket ka naam
        run: |
          # Comming soon
          echo "Supabase upload feature will be added here"
