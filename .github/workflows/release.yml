# File: .github/workflows/release.yml (Updated & Corrected Version)

name: Build and Release Android APK

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetches all history for accurate commit count

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # ✅ YAHAN ENV VARIABLES ADD KAR DIYE HAIN TAAKE VITE BUILD FAIL NA HO
      - name: Build Web Assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update Version in Gradle
        id: versioning
        run: |
          # Get version name from the release tag (e.g., v1.0.1 -> 1.0.1)
          VERSION_NAME=${{ github.event.release.tag_name }}
          # Remove 'v' prefix if it exists
          VERSION_NAME=${VERSION_NAME#v}
          
          # Use the number of commits as a unique version code
          VERSION_CODE=$(git rev-list --count HEAD)

          # Update build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle
          
          echo "Updated to Version Name: $VERSION_NAME, Version Code: $VERSION_CODE"
          # Set outputs for other steps to use
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-release-key.jks

      - name: Build Unsigned APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign APK
        id: sign_apk
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK_PATH="app-release.apk"
          
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks my-release-key.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --out $SIGNED_APK_PATH \
            $APK_PATH
          
          echo "signed_apk_path=$SIGNED_APK_PATH" >> $GITHUB_OUTPUT

      - name: Create Supabase Upload/Update Script
        run: |
          # This creates a small Node.js script to interact with Supabase
          cat << 'EOF' > upload.mjs
          import { createClient } from '@supabase/supabase-js';
          import fs from 'fs';

          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY);
          
          async function uploadAndSave() {
            const apkData = fs.readFileSync(process.env.APK_PATH);
            const apkName = 'app-release.apk'; // Always use the same name to overwrite

            console.log(`Uploading ${apkName} to bucket: ${process.env.BUCKET_NAME}`);
            const { error: uploadError } = await supabase.storage
              .from(process.env.BUCKET_NAME)
              .upload(apkName, apkData, { upsert: true, contentType: 'application/vnd.android.package-archive' });
            
            if (uploadError) throw new Error(`Upload failed: ${uploadError.message}`);
            console.log('Upload successful!');

            const { data: urlData } = supabase.storage.from(process.env.BUCKET_NAME).getPublicUrl(apkName);
            const publicUrl = `${urlData.publicUrl}?t=${Date.now()}`; // Add timestamp for cache busting
            
            console.log(`Updating database with version_code: ${process.env.VERSION_CODE}`);
            const { error: dbError } = await supabase
              .from('app_version')
              .update({
                version_code: process.env.VERSION_CODE,
                version_name: process.env.VERSION_NAME,
                apk_url: publicUrl,
              })
              .eq('id', 1);

            if (dbError) throw new Error(`DB update failed: ${dbError.message}`);
            console.log('Database update successful!');
          }

          uploadAndSave().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Upload to Supabase and Update DB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # ✅ YAHAN GITHUB SECRET KA SAHI NAAM LIKH DIYA HAI TAAKE SCRIPT FAIL NA HO
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APK_PATH: ${{ steps.sign_apk.outputs.signed_apk_path }}
          BUCKET_NAME: 'apk'
          VERSION_NAME: ${{ steps.versioning.outputs.version_name }}
          VERSION_CODE: ${{ steps.versioning.outputs.version_code }}
        run: node upload.mjs
