name: Generate Keystore (one-time)

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: 'Keystore password'
        required: true
      key_password:
        description: 'Key password'
        required: true
      alias:
        description: 'Key alias'
        required: true
        default: 'attendify'

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore attendify-upload.keystore \
            -alias "${{ github.event.inputs.alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 -storetype JKS \
            -dname "CN=Attendify, OU=Dev, O=Attendify, L=City, S=State, C=PK" \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}"

      - name: Base64 encode
        run: base64 -w 0 attendify-upload.keystore > keystore.b64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendify-keystore-b64
          path: keystore.b64
