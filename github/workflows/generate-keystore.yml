name: Generate Keystore (one-time)

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: 'Keystore Store Password'
        required: true
      key_password:
        description: 'Key Password'
        required: true
      alias:
        description: 'Key Alias'
        required: true
        default: 'attendify'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/attendify.keystore \
            -alias "${{ github.event.inputs.alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=Attendify, OU=Development, O=Attendify, L=Karachi, S=Sindh, C=PK"

      - name: Commit and Push Keystore
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/attendify.keystore
          git commit -m "Generated and added secure production keystore"
          git push
